name: Weekly Product Scrape & Wix Update

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      start_index:
        description: 'Override starting index (leave blank to use saved index)'
        required: false
        default: ''

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      # ── Step 1: Sync comp_data.csv with Wix catalog ───────────────────────
      - name: Sync catalog with Wix
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
        run: python sync_catalog.py

