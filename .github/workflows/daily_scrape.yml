      # ── Step 4: Update Wix products ───────────────────────────────────────
      - name: Run update.py
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
        run: python update.py

      # ── Step 5: Commit updated files back to repo ─────────────────────────
      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add comp_data.csv scrape_index.txt
          git diff --staged --quiet || git commit -m "chore: update comp_data.csv [$(date '+%Y-%m-%d')]"
          git push

