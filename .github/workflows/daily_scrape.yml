name: Weekly Product Scrape & Wix Update

on:
  # Run every Wednesday at midnight Pacific (7 AM UTC)
  schedule:
    - cron: '0 7 * * 3'

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      start_index:
        description: 'Override starting index (leave blank to use saved index)'
        required: false
        default: ''
      skip_scrape:
        description: 'Skip scrape and only run update (yes/no)'
        required: false
        default: 'no'

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      # ── Set scrape index ───────────────────────────────────────────────────
      - name: Set scrape index
        run: |
          if [ -n "${{ github.event.inputs.start_index }}" ]; then
            echo "INDEX=${{ github.event.inputs.start_index }}" >> $GITHUB_ENV
          elif [ -f scrape_index.txt ]; then
            echo "INDEX=$(cat scrape_index.txt)" >> $GITHUB_ENV
          else
            echo "INDEX=0" >> $GITHUB_ENV
          fi

      # ── Scrape DigiKey + Newark ────────────────────────────────────────────
      - name: Run scrapeNetwork.py
        if: ${{ github.event.inputs.skip_scrape != 'yes' }}
        env:
          NW_API_KEY: ${{ secrets.NW_API_KEY }}
          INDEX:      ${{ env.INDEX }}
        run: python scrapeNetwork.py
        
      - name: Diagnose store SKUs
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
        run: python diagnose_store.py
        
      # ── Update Wix CMS + Store Ribbons ─────────────────────────────────────
      - name: Run update.py
        env:
          WIX_API_KEY: ${{ secrets.WIX_API_KEY }}
          WIX_SITE_ID: ${{ secrets.WIX_SITE_ID }}
        run: python update.py

      # ── Commit updated files ───────────────────────────────────────────────
      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add comp_data.csv scrape_index.txt
          git diff --staged --quiet || git commit -m "chore: update comp_data.csv [$(date '+%Y-%m-%d')]"
          git push
